<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="titreModificationProfil">Modification Profil</title>
    <link rel="stylesheet" href="./../STYLES/output.css">
    <script src="./../SCRIPTS/Mprofil.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <!-- Script d'initialisation du thème pour éviter le flash blanc -->
    <script>
        const htmlElement = document.documentElement;
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
        } else {
            htmlElement.classList.remove('dark');
        }
    </script>
</head>
<body class="min-h-screen bg-[#F8F9FA] dark:bg-gray-900 flex items-center justify-center p-4 text-gray-800 dark:text-gray-200 transition-colors duration-200 relative">

    <!-- Bouton Mode Sombre/Clair en haut à droite -->
    <div class="absolute top-4 right-4">
        <button id="theme-toggle" title="Toggle Dark Mode" data-i18n-title="infobulleChangerTheme" class="p-2 rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-colors cursor-pointer shadow-sm">
            <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <svg id="theme-toggle-dark-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
    </div>

    <!--la page pour mettre la photo et le bio-->
    <div id="blocphotoEtBio" class="w-full max-w-[420px] flex flex-col items-center">
        
        <!-- Logo Icon -->
        <div class="bg-[#2563EB] w-12 h-12 rounded-xl flex items-center justify-center mb-5 shadow-sm">
            <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                <path fill-rule="evenodd" d="M4.804 21.644A6.707 6.707 0 006 21.75a6.721 6.721 0 003.583-1.029c.774.182 1.584.279 2.417.279 5.322 0 9.75-3.97 9.75-9 0-5.03-4.428-9-9.75-9s-9.75 3.97-9.75 9c0 2.409 1.025 4.587 2.674 6.192.232.226.277.428.254.543a3.73 3.73 0 01-.814 1.686.75.75 0 00.44 1.223zM8.25 10.875a1.125 1.125 0 100 2.25 1.125 1.125 0 000-2.25zM10.875 12a1.125 1.125 0 112.25 0 1.125 1.125 0 01-2.25 0zm4.875-1.125a1.125 1.125 0 100 2.25 1.125 1.125 0 000-2.25z" clip-rule="evenodd" />
            </svg>
        </div>

        <!-- Titre & Sous-titre -->
        <h1 data-i18n="titreCompleterProfil" class="text-2xl font-bold text-[#1D4ED8] dark:text-blue-500 mb-1.5">Complete Profile</h1>
        <p data-i18n="descCompleterProfil" class="text-gray-500 dark:text-gray-400 text-sm mb-6 text-center">Add a photo and a short bio to help people recognize you.</p>

        <!-- Carte du Formulaire -->
        <div class="bg-white dark:bg-gray-800 w-full rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-8 transition-colors duration-200">
            <form action="#" method="POST" class="space-y-6">
                
                <!-- Section: Photo de Profil -->
                <div class="flex flex-col items-center">
                    <span data-i18n="labelPhotoProfil" class="block text-sm font-medium text-gray-700 dark:text-gray-300 w-full mb-3">Profile Photo</span>
                    
                    <!-- Le conteneur principal (Clicable) -->
                    <div id="photo-container" class="relative group cursor-pointer">
                        
                        <!-- Cercle d'upload -->
                        <div id="photo-circle" class="w-24 h-24 rounded-full bg-[#F8FAFC] dark:bg-gray-750 border-2 border-dashed border-gray-300 dark:border-gray-600 flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 group-hover:border-[#2563EB] dark:group-hover:border-blue-500 group-hover:text-[#2563EB] dark:group-hover:text-blue-500 group-hover:bg-blue-50 dark:group-hover:bg-blue-900/20 transition-all overflow-hidden relative">
                            
                            <!-- Icône et texte par défaut -->
                            <div id="photo-placeholder" class="flex flex-col items-center">
                                <svg class="h-8 w-8 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                                <span data-i18n="labelUpload" class="text-[10px] font-medium uppercase tracking-wider">Upload</span>
                            </div>

                            <!-- L'image de prévisualisation (cachée par défaut) -->
                            <img id="photo-preview" class="absolute inset-0 w-full h-full object-cover hidden" alt="Profile Preview">
                        </div>
                        
                        <!-- Input file caché -->
                        <input type="file" id="profilePhoto" accept="image/png, image/jpeg, image/jpg" class="hidden">
                        
                        <!-- Petit badge "Modifier" en bas à droite -->
                        <div class="absolute bottom-0 right-0 bg-[#2563EB] text-white p-1.5 rounded-full border-2 border-white dark:border-gray-800 shadow-sm z-10">
                            <svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                            </svg>
                        </div>
                    </div>
                    <!-- Message d'erreur Photo -->
                    <p id="error-photo" data-i18n="erreurPhotoValide" class="mt-2 text-xs text-red-500 font-medium hidden">Le fichier n'est pas une image valide.</p>
                </div>

                <!-- Section: Bio -->
                <div>
                    <label for="bio" data-i18n="labelVotreBio" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Your Bio</label>
                    <div class="relative">
                        <textarea id="contenuBio" rows="3" data-i18n-placeholder="placeholderBio" placeholder="I am a software developer passionate about coding..." class="block w-full p-3 bg-[#F8FAFC] dark:bg-gray-700 border border-transparent rounded-lg text-sm text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 focus:bg-white dark:focus:bg-gray-800 focus:border-blue-600 dark:focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-900/30 outline-none transition-all resize-none"></textarea>
                    </div>
                    <!-- Message d'erreur Bio -->
                    <div class="flex justify-between items-center mt-1.5">
                        <p id="error-bio" data-i18n="erreurBioLimite" class="text-xs text-red-500 font-medium hidden">La bio ne doit pas dépasser 150 caractères.</p>
                        <!-- Compteur de caractères -->
                        <p class="text-xs text-gray-400 dark:text-gray-500 ml-auto"><span id="bio-counter">0</span>/150</p>
                    </div>
                </div>

                <!-- Bouton d'enregistrement -->
                <button type="submit" data-i18n="boutonEnregistrerProfil" class="btnProfilEtBio w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-[15px] font-semibold text-white bg-[#2563EB] hover:bg-blue-700 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors mt-2 cursor-pointer">
                    Save
                </button>

            </form>
        </div>

    </div>


</html>

<!DOCTYPE html>
<html lang="fr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="titrePageMessages">Kadea Chat - Messages</title>
    <link rel="stylesheet" href="../STYLES/output.css">
    <script src="./../SCRIPTS/app.js" type="module" defer></script>
    <script src="./../SCRIPTS/messages.js" defer></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom scrollbars */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; }
    </style>
</head>
<body class="relative bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-200 h-screen flex flex-col sm:flex-row overflow-hidden transition-colors duration-200">

    <!-- CONTENEUR PRINCIPAL DES MESSAGES (Liste + Tchat Actif) -->
    <div class="mb-25 sm:mb-0 flex-1 flex flex-row min-w-0 overflow-hidden">
        
        <!-- MIDDLE COLUMN (Chat List) -->
        <div class="w-full md:w-[320px] lg:w-[350px] flex flex-col border-r border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 flex-shrink-0">
            
            <!-- Current User Profile & Actions -->
            <div class="p-4 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="relative">
                        <img id="imgProfil" src="00" class="w-12 h-12 rounded-full object-cover">
                        <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-white dark:border-gray-800 rounded-full"></div>
                    </div>
                    <div>
                        <h2 id="nomUser" class="text-sm font-semibold text-gray-900 dark:text-white">Alex Rivera</h2>
                        <p data-i18n="monStatutActif" class="text-[11px] text-gray-500 dark:text-gray-400">Mon statut : Actif</p>
                    </div>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="px-4 pb-4">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" placeholder="Rechercher des conversations..." data-i18n-placeholder="rechercheConversations" class="w-full pl-9 pr-4 py-2 bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-700 rounded-full text-sm text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 placeholder-gray-400">
                </div>
            </div>

            <!-- Conversations List -->
            <div id="contenairConversationsMessages" class="flex-1 overflow-y-auto custom-scrollbar">
                <!-- Les conversations dynamiques seront injectées ici -->
            </div>
        </div>

        <!-- RIGHT COLUMN (Active Chat) -->
            <main id="containerDesMessagesDuneConversation" class="flex-1 flex flex-col bg-white dark:bg-gray-900 min-w-0 h-screen">
                
                <!-- 1. Chat Header (Reste fixé en haut) -->
                <div class="containerInfoContact flex-shrink-0">
                </div>   

                <!-- 2. Chat Messages Area (Prend tout l'espace central et défile) -->
                <div class="divTousMessage flex-1 flex flex-col min-h-0">
                    <div id="lesMessages" class="flex-1 overflow-y-auto p-4 sm:p-6 custom-scrollbar bg-[#FCFDFE] dark:bg-gray-900">
                        <!-- C'est ici qu'on va injecter uniquement les bulles de messages -->
                        <div id="zoneDesMessages" class="space-y-4"></div>
                        
                        <!-- L'ancre pour le scroll automatique -->
                        <div id="messages-end" class="h-2"></div>
                    </div>
                </div>

                <!-- 3. Chat Input Footer (Reste fixé en bas) -->
                <div id="divBtnEnvoie" class="flex-shrink-0">
                </div>

            </main>
        
    </div>

    <!-- SIDEBAR / NAVIGATION RESPONSIVE (Bas sur mobile, Gauche sur desktop) -->
    <aside class="fixed bottom-0 md:static mb:bottom-auto bg-white dark:bg-gray-900 border-t sm:border-t-0 sm:border-r border-gray-200 dark:border-gray-700 w-full sm:w-16 h-14 sm:h-full flex flex-row sm:flex-col items-center justify-around sm:justify-start py-0 sm:py-4 flex-shrink-0 z-20 order-last sm:order-first transition-colors duration-200">
        <!-- Logo masqué sur mobile -->
        <div class="hidden sm:flex mb-8 text-blue-600 dark:text-blue-500">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
        </div>
        
        <!-- Navigation avec gestion de l'état actif (Messages en Bleu) -->
        <nav class="flex-1 flex flex-row sm:flex-col items-center justify-around sm:justify-start w-full sm:space-y-4">
            
            <!-- Lien actif (Messages) -->
            <button onclick="window.location.href='message.html'" title="Messages" data-i18n-title="infobulleMessages" class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-sm cursor-pointer">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            </button>            

            <button onclick="window.location.href='contacts.html'" title="Utilisateurs" data-i18n-title="infobulleUtilisateurs" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-800 dark:hover:text-gray-300 transition-colors cursor-pointer">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </button>

            <button onclick="window.location.href='appel.html'" title="Appels" data-i18n-title="infobulleAppels" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-800 dark:hover:text-gray-300 transition-colors cursor-pointer">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
            </button>

            <button onclick="window.location.href='profil.html'" title="Mon Profil" data-i18n-title="infobulleMonProfil" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-800 dark:hover:text-gray-300 transition-colors cursor-pointer">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </button>
            
            <button onclick="window.location.href='parametre.html'" title="Paramètres" data-i18n-title="infobulleParametres" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-800 dark:hover:text-gray-300 transition-colors sm:mt-auto cursor-pointer">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </nav>
    </aside>

</body>
</html>

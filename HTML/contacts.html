<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="titrePageContacts">Kadea Chat - Contacts</title>
    <link rel="stylesheet" href="../STYLES/output.css">
    <script src="./../SCRIPTS/contacts.js" defer></script>
    <script src="./../SCRIPTS/app.js" type="module" defer></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        @variant dark (&:where(.dark, .dark *));

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom scrollbar for main area */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; }
    </style>
</head>
<body class="relative bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 h-screen flex flex-col sm:flex-row overflow-hidden transition-colors duration-200">
    
    <!-- MAIN CONTENT AREA -->
    <main class="mb-25 sm:mb-0 flex-1 flex flex-col min-w-0 overflow-hidden">
        
        <!-- HEADER -->
        <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 h-16 flex items-center justify-between px-4 sm:px-6 flex-shrink-0 transition-colors duration-200 z-10">
            <h1 data-i18n="nomApp" class="text-blue-600 dark:text-blue-400 font-bold text-lg">Kadea Chat</h1>
            
            <div class="flex items-center space-x-3 sm:space-x-4 text-gray-500 dark:text-gray-400">
                <div class="h-5 w-px bg-gray-300 dark:bg-gray-600 hidden sm:block"></div>
                    <div class="relative flex items-center border border-gray-200 dark:border-gray-800 bg-white/50 dark:bg-gray-900/50 backdrop-blur-md rounded-xl px-3 py-2 text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-all">
                        <svg class="w-5 h-5 mr-1.5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 21l5.25-11.25L21 21m-9-3h7.5M3 5.621a48.474 48.474 0 006-.371m0 0c1.12 2.233 2.707 4.12 4.755 5.51a21.751 21.751 0 01-4.76 2.871m4.755-8.381a48.4 48.4 0 013.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                        </svg>
                        <select id="language-select" class="bg-transparent border-none text-xs font-semibold focus:outline-none cursor-pointer pr-1">
                            <option value="fr" class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-100">FR</option>
                            <option value="en" class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-100">EN</option>
                            <option value="ln" class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-100">LN</option>
                        </select>
                    </div>


                <button id="theme-toggle" title="Toggle Dark Mode" data-i18n-title="infobulleTheme" class="hover:text-gray-700 dark:hover:text-gray-200 transition-colors">
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg id="theme-toggle-dark-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </div>
        </header>

        <!-- CONTAINER PRINCIPAL -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-4 sm:p-8 w-full max-w-5xl mx-auto space-y-10">
            
            <!-- Entête de la section -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div>
                    <h2 data-i18n="titreUtilisateurs" class="text-2xl font-bold text-gray-900 dark:text-white">Utilisateurs</h2>
                    <p data-i18n="descUtilisateurs" class="text-sm text-gray-500 dark:text-gray-400 mt-1">Découvrez et connectez-vous avec les membres de la communauté.</p>
                </div>
                
                <div class="relative w-full sm:w-64">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </span>
                    <input type="text" placeholder="Rechercher un membre..." data-i18n-placeholder="rechercheMembre" class="inputRechercheMembre w-full pl-9 pr-4 py-2 text-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:outline-none focus:border-blue-500 text-gray-900 dark:text-white transition-colors">
                </div>
            </div>

            <!-- SECTION 1 : CONTACTS RECENTS (Les 3 derniers comptes crées) -->
            <div>
                <h3 data-i18n="contactsRecents" class="text-xs font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-4">Contacts Récents</h3>
                <div id="divCompteRecent" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    
                    <!-- Card  -->
                    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5 shadow-sm flex flex-col items-center text-center">
                        <div class="relative">
                            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&h=150&q=80" alt="Avatar" class="w-14 h-14 rounded-full object-cover">
                            <div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-green-500 border-2 border-white dark:border-gray-800 rounded-full"></div>
                        </div>
                        <h4 class="font-semibold text-gray-900 dark:text-white mt-3 text-sm">Alex Rivera</h4>
                        <p class="text-[11px] text-gray-400 dark:text-gray-500">@arivera_chat</p>
                        <button data-i18n="boutonDiscuter" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium py-2 rounded-lg transition-colors">Discuter</button>
                    </div>
                </div>
            </div>

            <!-- SECTION 2 : TOUS LES AUTRES MEMBRES (Format Liste optimisé pour 100+ éléments) -->
            <div class="space-y-4">
                <div class="flex items-center justify-between border-b border-gray-200 dark:border-gray-700 pb-2">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500">
                        <span data-i18n="tousLesMembres">Tous les membres</span> (<span class="nbreUsers">0</span>)
                    </h3>
                </div>

                <div id="containerUsers" class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 divide-y divide-gray-100 dark:divide-gray-700 shadow-sm">

                </div>
            </div>

            <!-- FOOTER TECHNIQUE -->
            <div class="pt-6 pb-4 text-center">
                <p data-i18n="footerTechnique" class="text-[11px] text-gray-400 dark:text-gray-500">Kadea Chat v1.0.0 — Encryption Active</p>
            </div>
        </div>
    </main>

    <!-- SIDEBAR (Navigation Latérale Gauche) -->
    <aside class="fixed bottom-0 md:static mb:bottom-auto bg-white dark:bg-gray-900 border-t sm:border-t-0 sm:border-r border-gray-200 dark:border-gray-700 w-full sm:w-16 h-14 sm:h-full flex flex-row sm:flex-col items-center justify-around sm:justify-start py-0 sm:py-4 flex-shrink-0 z-20 order-last sm:order-first transition-colors duration-200">
        <div class="hidden sm:flex mb-8 text-blue-600 dark:text-blue-500">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
        </div>
        <nav class="flex-1 flex flex-row sm:flex-col items-center justify-around sm:justify-start w-full sm:space-y-4">
            
            <button onclick="window.location.href='message.html'" title="Messages" data-i18n-title="infobulleMessages" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-800 dark:hover:text-gray-300 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            </button>            

            <button onclick="window.location.href='contacts.html'" title="Utilisateurs" data-i18n-title="infobulleUtilisateurs" class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-sm">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </button>


            <button onclick="window.location.href='appel.html'" title="Appels" data-i18n-title="infobulleAppels" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-800 dark:hover:text-gray-300 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
            </button>

            <button onclick="window.location.href='profil.html'" title="Mon Profil" data-i18n-title="infobulleMonProfil" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-800 dark:hover:text-gray-300 transition-colors">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </button>

            <button onclick="window.location.href='parametre.html'" title="Paramètres" data-i18n-title="infobulleParametres" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-800 dark:hover:text-gray-300 transition-colors sm:mt-auto">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </nav>
        

    </aside>
    
</body>
</html>

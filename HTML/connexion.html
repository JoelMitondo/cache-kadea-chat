<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="titreConnexion">Connexion</title>
    <link rel="icon" href="https://i.ibb.co/270F8B9d/kadea-chat-icone.png" type="image/png">
    <link class="theme-style" rel="stylesheet" href="./../STYLES/output.css">
    <script src="./../SCRIPTS/app.js" type="module" defer></script>
    <script src="./../SCRIPTS/connexion.js" type="module" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="relative min-h-screen bg-[#F8F9FA] dark:bg-gray-950 flex items-center justify-center p-4 text-gray-800 dark:text-gray-100 transition-colors duration-300">
        <div class="absolute top-3 right-3 flex items-center space-x-3 z-20">
            <!-- SÉLECTEUR DE LANGUE (Design épuré et moderne) -->
            <div class="relative flex items-center border border-gray-200 dark:border-gray-800 bg-white/50 dark:bg-gray-900/50 backdrop-blur-md rounded-xl px-3 py-2 text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-all">
                <!-- 🇨🇳 Icône de traduction (Lettre A & Caractère Chinois "文") -->
                <svg class="w-5 h-5 mr-1.5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 21l5.25-11.25L21 21m-9-3h7.5M3 5.621a48.474 48.474 0 006-.371m0 0c1.12 2.233 2.707 4.12 4.755 5.51a21.751 21.751 0 01-4.76 2.871m4.755-8.381a48.4 48.4 0 013.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                </svg>
                <select id="language-select" class="bg-transparent border-none text-xs font-semibold focus:outline-none cursor-pointer pr-1">
                    <option value="fr" class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-100">FR</option>
                    <option value="en" class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-100">EN</option>
                    <option value="ln" class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-100">LN</option>
                </select>
            </div>

            <!-- Bouton de bascule Mode Sombre / Clair -->
            <button id="theme-toggle" title="Changer de mode" class="w-10 h-10 rounded-xl border border-gray-200 dark:border-gray-800 bg-white/50 dark:bg-gray-900/50 backdrop-blur-md flex items-center justify-center text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-all cursor-pointer">
                <!-- Icône Soleil (s'affiche en mode sombre) -->
                <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <!-- Icône Lune (s'affiche en mode clair) -->
                <svg id="theme-toggle-dark-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </div>
    
    <!--La page de connexion-->
    <div class="w-full max-w-[420px] flex flex-col items-center">
        <div class="bg-[#2563EB] w-12 h-12 rounded-xl flex items-center justify-center mb-5 shadow-sm">
            <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                <path fill-rule="evenodd" d="M4.804 21.644A6.707 6.707 0 006 21.75a6.721 6.721 0 003.583-1.029c.774.182 1.584.279 2.417.279 5.322 0 9.75-3.97 9.75-9 0-5.03-4.428-9-9.75-9s-9.75 3.97-9.75 9c0 2.409 1.025 4.587 2.674 6.192.232.226.277.428.254.543a3.73 3.73 0 01-.814 1.686.75.75 0 00.44 1.223zM8.25 10.875a1.125 1.125 0 100 2.25 1.125 1.125 0 000-2.25zM10.875 12a1.125 1.125 0 112.25 0 1.125 1.125 0 01-2.25 0zm4.875-1.125a1.125 1.125 0 100 2.25 1.125 1.125 0 000-2.25z" clip-rule="evenodd" />
            </svg>
        </div>

        <h1 data-i18n="bienvenueRetour" class="text-2xl font-bold text-[#1D4ED8] dark:text-blue-500 mb-1.5">Welcome back</h1>
        <p data-i18n="descriptionConnexion" class="text-gray-500 dark:text-gray-400 text-sm mb-6 text-center">Please enter your details to sign in to Kadea Chat</p>

        <div class="bg-white dark:bg-gray-900 w-full rounded-xl shadow-sm border border-gray-200 dark:border-gray-800 p-8 transition-colors duration-300">
            <form action="#" method="POST" class="space-y-5">
                
                <div>
                    <label data-i18n="adresseEmailLabel" for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <input type="email" id="emailLogin" required placeholder="joelMitondo@gmail.com" class="block w-full pl-11 pr-3 py-2.5 bg-[#F8FAFC] dark:bg-gray-800 border-transparent dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 focus:bg-white dark:focus:bg-gray-900 focus:border-blue-600 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-900/30 outline-none transition-all">
                    </div>
                    <p id="error-login-email" class="hidden mt-1.5 text-xs text-red-500 font-medium"></p>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label data-i18n="motDePasseLabel" for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
                        <a data-i18n="motDePasseOublie" href="./Mdpo.html" class="text-sm font-medium text-[#2563EB] dark:text-blue-400 hover:underline">Forgot?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" id="passwordLogin" required placeholder="••••••••" class="block w-full pl-11 pr-10 py-2.5 bg-[#F8FAFC] dark:bg-gray-800 border-transparent dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 focus:bg-white dark:focus:bg-gray-900 focus:border-blue-600 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-900/30 outline-none transition-all">
                        <!-- ID ajouté sur le conteneur de l'icône de l'œil -->
                        <div id="togglePasswordLoginBtn" class="absolute inset-y-0 right-0 pr-3.5 flex items-center cursor-pointer">
                            <svg class="h-5 w-5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </div>
                    </div>
                    <p data-i18n="erreurMotDePasseIncorrect" id="error-login-password" class="mt-1.5 text-xs text-red-500 font-medium">Mot de passe incorrect</p>
                </div>

                <div class="flex items-center pt-1">
                    <input id="keep-signed-in" type="checkbox" class="h-4 w-4 text-[#2563EB] bg-[#F8FAFC] dark:bg-gray-800 border-gray-300 dark:border-gray-700 rounded focus:ring-blue-500">
                    <label data-i18n="resterConnecte" for="keep-signed-in" class="ml-2 block text-sm text-gray-700 dark:text-gray-300 cursor-pointer">
                        Keep me signed in
                    </label>
                </div>

                <button type="submit" id="btnLogin" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-[15px] font-semibold text-white bg-[#2563EB] hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors mt-2">
                    <span data-i18n="boutonConnexion">Login</span>
                </button>

            </form>
        </div>

        <p class="text-center text-sm text-gray-600 dark:text-gray-400 mt-6">
            <span data-i18n="pasDeCompte">Don't have an account?</span> <a href="./creationCompte.html" data-i18n="creerCompteLien" class="text-[#2563EB] dark:text-blue-400 font-medium hover:underline">Create Account</a>
        </p>
        <p class="text-center text-sm text-gray-600 dark:text-gray-400 mt-6">
           <a href="./../index.html" data-i18n="accueilLien" class="text-[#2563EB] dark:text-blue-400 font-medium hover:underline">Acceuil</a>
        </p>

    </div>

    <!-- Pop-up de Notification -->
    <div id="pop-notification" class="fixed top-5 right-5 z-[10000] transform transition-all duration-500 translate-x-full opacity-0 flex items-center w-full max-w-sm p-4 space-x-3 rounded-lg shadow-xl text-white" role="alert">
        
        <!-- Zone de l'icône (dynamique) -->
        <div id="pop-icon-container" class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg bg-white/20">
            <!-- L'icône SVG sera injectée ici par JavaScript -->
        </div>
        
        <!-- Texte du message -->
        <div id="pop-message" class="ml-3 text-sm font-medium">
            Message par défaut
        </div>

    </div>
</body>
</html>
